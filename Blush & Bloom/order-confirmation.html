<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation - Blush & Bloom</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff0f5;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .confirmation-box {
      background-color: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      color: #d63384;
    }
    p {
      font-size: 16px;
      margin-top: 10px;
    }
    .home-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #d63384;
      color: white;
      border: none;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .home-btn:hover {
      background-color: #b52d6b;
    }
  </style>
</head>
<body>
  <div class="confirmation-box">
    <h1>Thank You!</h1>
    <p>Your order has been placed successfully.</p>
    <p>We’ll deliver your Blush & Bloom products within 3–5 working days.</p>
    <div style="text-align: center; margin-top: 30px;">
  <a href="home.html">
    <button style="padding: 10px 20px; background-color: #e91e63; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;">
      Back to Home
    </button>
  </a>
</div>
</body>
</html>
