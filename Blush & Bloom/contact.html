<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | Blush & Bloom</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fffafc;
      color: #333;
    }

    header {
      background-color: #ffcce0;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      color: #b30059;
      font-size: 36px;
    }

    .contact-section {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background-color: #fff0f5;
      border-radius: 10px;
      box-shadow: 0 0 10px #f9d6e4;
    }

    .contact-section h2 {
      color: #cc0066;
      margin-bottom: 20px;
    }

    .contact-section input,
    .contact-section textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .contact-section button {
      background-color: #cc0066;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .contact-section button:hover {
      background-color: #a30052;
    }

    footer {
      background-color: #ffe6f0;
      padding: 15px;
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Us</h1>
  </header>

  <div class="contact-section">
    <h2>We’d love to hear from you!</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <h2>Visit Us</h2>
<div style="width: 100%; height: 350px;">
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d241317.116097393!2d72.74109954825863!3d19.08252232087267!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7b63c7f90c5e3%3A0x99e2d5197dbdf1e7!2sMumbai%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1654957518139!5m2!1sen!2sin" 
    width="100%" 
    height="100%" 
    style="border:0;" 
    allowfullscreen="" 
    loading="lazy" 
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

  </div>

  <footer>
    &copy; 2025 Blush & Bloom. All rights reserved.
  </footer>

</body>
</html>
